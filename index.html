<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <meta name="description" content="Half Nasus Half Dog">
  <meta name="keywords" content="nasus, nasusdog, nasusthedog">
  <link rel="icon" href="/images/favicon64x64.png" type="png" sizes="64x64">
  <link rel="icon" href="/images/favicon32x32.png" type="png" sizes="32x32">
  <link rel="icon" href="/images/favicon16x16.png" type="png" sizes="16x16">
  <title>Nasus the Dog picture</title>

  <style>
    * {
      box-sizing: border-box;
    }
    
    /* Add a gray background color with some padding */
    body {
      font-family: Arial;
      padding: 20px;
      background: #f1f1f1;
    }
    
    /* Header/Blog Title */
    header {
      padding: 30px;
      font-size: 40px;
      text-align: center;
      background: white;
    }
    
    /* Create two unequal columns that floats next to each other */
    /* Left column */
    .leftcolumn {   
      float: left;
      width: 75%;
    }
    
    /* Right column */
    .rightcolumn {
      float: left;
      width: 25%;
      padding-left: 20px;
    }
    
    /* Fake image */
    .fakeimg {
      background-color: #aaa;
      width: 100%;
      padding: 20px;
    }
    
    /* Add a card effect for articles */
    .card {
       background-color: white;
       padding: 20px;
       margin-top: 20px;
    }
    
    /* Clear floats after the columns */
    .row:after {
      content: "";
      display: table;
      clear: both;
    }
    
    /* Footer */
    .footer {
      padding: 20px;
      text-align: center;
      background: #ddd;
      margin-top: 20px;
    }
  </style>

</head>

<body>
<header>
  <h1>Nasus the Dog</h1>
</header>

<img src="/images/nasusdog.png" alt="There must be Nasus the Dog" width="1000">

</body>
</html>
